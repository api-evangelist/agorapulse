components:
  schemas:
    AudienceReportByDate:
      type: object
      properties:
        date:
          type: string
          description: Date in ISO format YYYY-MM-DD
          example: '2020-04-18T00:00:00.000Z'
        engagementCount:
          type: integer
          description: Number of engagement
          format: int64
          example: 99
      description: Common properties for audience report insight
      oneOf:
        - $ref: '#/components/schemas/FacebookAudienceInsight'
        - $ref: '#/components/schemas/TwitterAudienceInsight'
        - $ref: '#/components/schemas/LinkedinAudienceInsight'
        - $ref: '#/components/schemas/InstagramAudienceInsight'
        - $ref: '#/components/schemas/TiktokAudienceInsight'
        - $ref: '#/components/schemas/YoutubeAudienceInsight'
        - $ref: '#/components/schemas/ThreadsAudienceInsight'
    CommunityManagementAction:
      type: object
      properties:
        averageResponseTime:
          type: integer
          description: Average time to respond
          format: int64
          example: 15
        repliesCount:
          type: integer
          description: Number of replies
          format: int64
          example: 2
        reviewsCount:
          type: integer
          description: Number of reviews
          format: int64
          example: 10
        username:
          type: string
          description: Name of the user who performed community management actions
          example: User123
    CommunityManagementByDate:
      type: object
      properties:
        date:
          type: string
          description: Date in ISO format YYYY-MM-DD
          example: '2020-04-18T00:00:00.000Z'
        sentRepliesCount:
          type: integer
          description: Number of replies sent
          format: int64
          example: 12
        actions:
          type: array
          description: List of actions made by users
          oneOf:
            - $ref: '#/components/schemas/CommunityManagementAction'
            - $ref: '#/components/schemas/FacebookCommunityManagementAction'
            - $ref: '#/components/schemas/LinkedinCommunityManagementAction'
            - $ref: '#/components/schemas/InstagramCommunityManagementAction'
            - $ref: '#/components/schemas/TiktokCommunityManagementAction'
            - $ref: '#/components/schemas/YoutubeCommunityManagementAction'
          items:
            $ref: '#/components/schemas/CommunityManagementAction'
      description: Common properties for community management report
    CommunityManagementInsight:
      required:
        - data
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CommunityManagementByDate'
      description: List of community management insight
    ContentReportData:
      type: object
      properties:
        engagementCount:
          type: integer
          description: Number of engagement
          format: int64
          example: 577
        id:
          type: string
          description: Post id on the native network
          example: '12232123'
        publishingDate:
          type: string
          description: Publishing date
          format: date-time
          example: null
        postUrl:
          type: string
          description: Post url on the native network
        tags:
          type: array
          description: Label applied to the post
          example:
            - test
            - test2
          items:
            type: string
        text:
          type: string
          description: Text of the published post
          example: This is a post
        username:
          type: string
          description: Name of the user who published the post
          example: User123
      description: Common properties for content report insight
      oneOf:
        - $ref: '#/components/schemas/FacebookContentReportInsight'
        - $ref: '#/components/schemas/TwitterContentReportInsight'
        - $ref: '#/components/schemas/LinkedinContentReportInsight'
        - $ref: '#/components/schemas/InstagramContentReportInsight'
        - $ref: '#/components/schemas/InstagramStoryContentReportInsight'
        - $ref: '#/components/schemas/TikTokContentReportInsight'
        - $ref: '#/components/schemas/YoutubeContentReportInsight'
    ContentReportInsight_1:
      required:
        - data
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContentReportData'
      description: List of content report insight
    FacebookAudienceInsight:
      type: object
      properties:
        angryCount:
          type: integer
          description: Number of angry (reaction)
          format: int64
          example: 120
        organicEngagementCount:
          type: integer
          description: Number of organic engagement
          format: int64
          example: 23
        paidEngagementCount:
          type: integer
          description: Number of paid engagement
          format: int64
          example: 76
        engagementRatePerView:
          type: number
          description: Ratio of engagement to view as a percentage
          format: double
          example: 24.2
        organicEngagementRatePerView:
          type: number
          description: Ratio of organic engagement to view as a percentage
          format: double
          example: 10.2
        paidEngagementRatePerView:
          type: number
          description: Ratio of paid engagement to view as a percentage
          format: double
          example: 14
        engagementRatePerReach:
          type: number
          description: Ratio of engagement to reach as a percentage
          format: double
          example: 26.6
        organicEngagementRatePerReach:
          type: number
          description: Ratio of organic engagement to reach as a percentage
          format: double
          example: 14.4
        paidEngagementRatePerReach:
          type: number
          description: Ratio of paid engagement to reach as a percentage
