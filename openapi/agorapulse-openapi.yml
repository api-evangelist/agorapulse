openapi: 3.1.0
info:
  title: Open API
  description: Agorapulse's Open API documentation
  version: '1.0'
security:
  - bearerAuth: []
tags:
  - name: Simple Drafts
    description: Publishing simple drafts management
  - name: Calendar Notes
    description: Publishing calendar notes management
  - name: Simple Scheduling
    description: Publishing simple scheduled and immediate posts management
  - name: Studio Media
    description: Studio media upload management
  - name: Inbox accounts
    description: REST APIs related to the inbox
  - name: Inbox Item Labels
    description: Manage inbox item labels
  - name: Inbox user
    description: REST APIs related to the inbox users
  - name: Inbox user notes
    description: REST APIs related to the inbox user notes
  - name: Inbox Workspace
    description: REST APIs related to the inbox workspaces
paths:
  /v1.0/report/health:
    get:
      tags:
        - OpenAPI
      summary: Get health
      description: Provides information about the state of the API
      operationId: health
      responses:
        '200':
          description: The API is healthy and working
          content:
            application/json:
              examples:
                example:
                  value: OK
  '/v1.0/report/organizations/{organizationId}/workspaces/{workspaceId}/profiles/{profileUid}/insights/audience':
    get:
      tags:
        - Report
      summary: Get audience report
      description: Get audience report
      operationId: getAudience
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: string
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: string
        - name: profileUid
          in: path
          description: Profile uid
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: true
          explode: false
          schema:
            type: string
        - name: until
          in: query
          required: true
          explode: false
          schema:
            type: string
      responses:
        '200':
          description: Audience is returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAudienceInsight'
  '/v1.0/report/organizations/{organizationId}/workspaces/{workspaceId}/profiles/{profileUid}/insights/communitymanagement':
    get:
      tags:
        - Report
      summary: Get community management report
      description: Get community management report
      operationId: getCommunityManagement
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: string
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: string
        - name: profileUid
          in: path
          description: Profile uid
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: true
          explode: false
          schema:
            type: string
        - name: until
          in: query
          required: true
          explode: false
          schema:
            type: string
      responses:
        '200':
          description: Community management is returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityManagementInsight'
  '/v1.0/report/organizations/{organizationId}/workspaces/{workspaceId}/profiles/{profileUid}/insights/content':
    get:
      tags:
        - Report
      summary: Get content report
      description: Get content report
      operationId: getContentReport
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: string
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: string
        - name: profileUid
          in: path
          description: Profile uid
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: true
          explode: false
          schema:
            type: string
        - name: until
          in: query
          required: true
          explode: false
          schema:
            type: string
      responses:
        '200':
          description: Content report is returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentReportInsight_1'
  /v1.0/core/organizations:
    get:
      tags:
        - Organization
      summary: Get manager organizations
      description: List all organizations the manager belongs to
      operationId: getManagerOrganizations
      parameters:
        - name: v
          in: query
          description: API version
          schema:
            type: string
      responses:
        '200':
          description: List of the manager organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
  '/v1.0/core/organizations/{organizationId}/workspaces':
    get:
      tags:
        - Workspace
      summary: Get organization workspaces
      description: List all the workspaces in an organization
      operationId: getOrganizationWorkspaces
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: string
        - name: v
          in: query
          description: API version
          schema:
            type: string
      responses:
        '200':
          description: List of all workspaces in the organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceListResponse'
  '/v1.0/core/organizations/{organizationId}/workspaces/{workspaceId}/profiles':
    get:
      tags:
        - Profile
      summary: Get workspace profiles
      description: List all profiles in a workspace
      operationId: getWorkspaceProfiles
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: string
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: string
        - name: v
          in: query
          description: API version
          schema:
            type: string
      responses:
        '200':
          description: List of the profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileListResponse'
  '/v1.0/publishing/organizations/{organizationId}/workspaces/{workspaceId}/notes':
    get:
      tags:
        - Calendar Notes
      summary: Search calendar notes
      description: Search and filter calendar notes in the specified workspace
      operationId: search
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
        - name: since
          in: query
          description: Filter notes after this date (ISO date)
        - name: until
          in: query
          description: Filter notes before this date (ISO date)
        - name: profileUids
          in: query
          description: Filter by profile UIDs
      responses:
        '200':
          description: Calendar notes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCalendarNoteOpenResponse'
        '400':
          description: Invalid search parameters
        '404':
          description: Organization or workspace not found
    post:
      tags:
        - Calendar Notes
      summary: Create a new calendar note
      description: Creates a new calendar note in the specified content
      operationId: save
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
      requestBody:
        description: Calendar note to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCalendarNoteOpenRequest'
        required: true
      responses:
        '201':
          description: Calendar note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCalendarNoteOpenResponse'
        '400':
          description: Invalid request data
        '404':
          description: Organization or workspace not found
  '/v1.0/publishing/organizations/{organizationId}/workspaces/{workspaceId}/notes/{uid}':
    put:
      tags:
        - Calendar Notes
      summary: Update a calendar note
      description: Updates an existing calendar note with new data
      operationId: update
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
        - name: uid
          in: path
          description: Calendar note unique identifier
          required: true
      requestBody:
        description: Updated calendar note data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCalendarNoteOpenRequest'
        required: true
      responses:
        '200':
          description: Calendar note updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCalendarNoteOpenResponse'
        '400':
          description: Invalid request data
        '403':
          description: Insufficient permissions to update the note
        '404':
          description: 'Calendar note, organization, or workspace not found'
    delete:
      tags:
        - Calendar Notes
      summary: Delete a calendar note
      description: Deletes a calendar note by its UID
      operationId: delete
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
        - name: uid
          in: path
          description: Calendar note unique identifier
          required: true
      responses:
        '204':
          description: Calendar note deleted successfully
        '403':
          description: Insufficient permissions to delete the note
        '404':
          description: 'Calendar note, organization, or workspace not found'
  '/v1.0/publishing/organizations/{organizationId}/workspaces/{workspaceId}/simple-drafts':
    post:
      tags:
        - Simple Drafts
      summary: Create a simple draft
      description: >-
        Creates a new simple draft with text, media, and scheduling options in
        the specified workspace
      operationId: save_1
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
      requestBody:
        description: Simple draft to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSimpleDraftOpenRequest'
        required: true
      responses:
        '201':
          description: Simple draft created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSimpleDraftOpenResponse'
        '400':
          description: Invalid request data
        '404':
          description: Organization or workspace not found
  '/v1.0/publishing/organizations/{organizationId}/workspaces/{workspaceId}/simple-schedule-posts':
    post:
      tags:
        - Simple Scheduling
      summary: Create a scheduled post
      description: >-
        Creates a new scheduled post with text, media, and publishing dates in
        the specified workspace
      operationId: save_2
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
      requestBody:
        description: Scheduled post to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSimpleScheduleOpenRequest'
        required: true
      responses:
        '201':
          description: Scheduled post created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSimpleScheduleOpenResponse'
        '400':
          description: Invalid request data
        '404':
          description: Organization or workspace not found
  '/v1.0/publishing/organizations/{organizationId}/workspaces/{workspaceId}/simple-schedule-posts:publish-now':
    post:
      tags:
        - Simple Scheduling
      summary: Publish a post immediately
      description: >-
        Publishes a new post immediately on the specified profiles in the
        workspace
      operationId: publishNow
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
      requestBody:
        description: Post to publish immediately
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimplePublishOpenRequest'
        required: true
      responses:
        '201':
          description: Post published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSimpleScheduleOpenResponse'
        '400':
          description: Invalid request data
        '404':
          description: Organization or workspace not found
  '/v1.0/library/organizations/{organizationId}/workspaces/{workspaceId}/studio/media/upload':
    post:
      tags:
        - Studio Media
      summary: Request a presigned upload URL for studio media
      description: >-
        Returns a presigned S3 PUT URL that can be used to upload a media file
        directly to S3
      operationId: requestUpload
      parameters:
        - name: organizationId
          in: path
          description: Organization identifier
          required: true
        - name: workspaceId
          in: path
          description: Workspace identifier
          required: true
      requestBody:
        description: Upload request details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudioMediaUploadOpenRequest'
        required: true
      responses:
        '201':
          description: Presigned upload URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudioMediaUploadOpenResponse'
        '400':
          description: Invalid request data
        '404':
          description: Organization or workspace not found
  '/v1.0/inbox/organizations/{organizationId}/workspaces/{workspaceId}/accounts/{accountUid}/conversations/{conversationId}/messages':
    get:
      tags:
        - Inbox conversations
      summary: Get conversation messages
      operationId: getMessages
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: integer
          example: 1419
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: integer
          example: 1416
        - name: accountUid
          in: path
          description: Account uid
          required: true
          schema:
            type: string
          example: facebook_611
        - name: conversationId
          in: path
          description: Conversation id
          required: true
          schema:
            type: string
        - name: since
          in: query
          description: >-
            Filter messages created after this date (inclusive). ISO 8601
            format.
          schema:
            type: string
            format: date-time
          example: '2025-10-01T09:00:00.000Z'
        - name: until
          in: query
          description: >-
            Filter messages created before this date (inclusive). ISO 8601
            format.
          schema:
            type: string
            format: date-time
          example: '2025-10-15T13:00:00.000Z'
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: string
        - name: limit
          in: query
          description: >-
            Maximum number of messages to return per page. Must be between 1 and
            25.
          schema:
            type: integer
          example: 10
        - name: order
          in: query
          description: >-
            Sort order for the results. ASC for ascending (oldest first), DESC
            for descending (newest first).
          schema:
            $ref: '#/components/schemas/Order'
          example: DESC
      responses:
        '200':
          description: getMessages 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesSearchResponse'
  '/v1.0/inbox/organizations/{organizationId}/workspaces/{workspaceId}/accounts/{accountUid}/reply':
    post:
      tags:
        - Inbox reply
      summary: Reply to an item
      operationId: create
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: integer
          example: 1419
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: integer
          example: 1416
        - name: accountUid
          in: path
          description: Account uid
          required: true
          schema:
            type: string
          example: facebook_611
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplyRequest'
        required: true
      responses:
        '200':
          description: create 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDTO'
  '/v1.0/inbox/organizations/{organizationId}/workspaces/{workspaceId}/items':
    get:
      tags:
        - Inbox items
      summary: Find items
      operationId: findItems
      parameters:
        - name: organizationId
          in: path
          description: Organization id
          required: true
          schema:
            type: integer
          example: 1419
        - name: workspaceId
          in: path
          description: Workspace id
          required: true
          schema:
            type: integer
          example: 1416
        - name: accountUids
          in: query
          description: >-
            Set of account UIDs to filter items. Only items from these accounts
            will be returned.
          schema:
            type: array
            items:
              type: string
        - name: toReview
          in: query
          description: Filter items that need review (not yet approved by a manager)
          schema:
            type: boolean
        - name: labels
          in: query
          description: >-
            Filter items by labels. Only items with these labels will be
            returned.
          schema:
            type: array
            items:
              type: string
        - name: sentiments
          in: query
          description: Filter items by sentiment.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ItemSentiment'
        - name: types
          in: query
          description: >-
            Filter items by type/source. Specify the types of items to retrieve
            (e.g., organicComment, adsComment, conversation, ...)
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ItemFilterType'
        - name: since
          in: query
          description: Filter items created after this date (inclusive). ISO 8601 format.
          schema:
            type: string
            format: date-time
          example: '2025-10-01T09:00:00.000Z'
        - name: until
          in: query
          description: Filter items created before this date (inclusive). ISO 8601 format.
          schema:
            type: string
            format: date-time
          example: '2025-10-15T13:00:00.000Z'
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: string
        - name: limit
          in: query
          description: >-
            Maximum number of items to return per page. Must be between 1 and
            25.
          schema:
            type: integer
          example: 10
        - name: order
          in: query
          description: >-
            Sort order for the results. ASC for ascending (oldest first), DESC
            for descending (newest first).
          schema:
            $ref: '#/components/schemas/Order'
          example: DESC
      responses:
        '200':
          description: findItems 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsSearchResponse'
webhooks:
